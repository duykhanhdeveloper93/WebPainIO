name: PaintCo CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: cd backend && npm install && npm run build
      - name: Build frontend  
        run: cd frontend && npm install && npm run build
