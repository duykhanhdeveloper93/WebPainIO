# ── Upstream ────────────────────────────────────────────────────
upstream paintco_backend  { server 127.0.0.1:3000 fail_timeout=10s; keepalive 32; }
upstream paintco_frontend { server 127.0.0.1:4000 fail_timeout=10s; keepalive 32; }
upstream paintco_jenkins  { server 127.0.0.1:8080 fail_timeout=30s; }

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_HERE www.DOMAIN_HERE;

    # Let's Encrypt challenge (phai de HTTP cho Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main App ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_HERE www.DOMAIN_HERE;

    # SSL — Certbot tu dong dien vao
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_HERE/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # Upload size
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/paintco.access.log combined;
    error_log  /var/log/nginx/paintco.error.log warn;

    # ── WebSocket — Socket.io (Chat + WebRTC) ───────────────────
    location /socket.io/ {
        proxy_pass http://paintco_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
        proxy_buffering off;
    }

    # ── API — NestJS Backend ─────────────────────────────────────
    location /api/ {
        proxy_pass http://paintco_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout  120s;
        proxy_connect_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # ── Uploads — Static files ───────────────────────────────────
    location /uploads/ {
        proxy_pass http://paintco_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Angular SPA — Frontend ───────────────────────────────────
    location / {
        proxy_pass http://paintco_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # SPA: fallback to index.html
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    location @fallback {
        proxy_pass http://paintco_frontend;
        proxy_set_header Host $host;
    }

    # Cache Angular assets (hash-named files)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://paintco_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ── HTTPS Jenkins CI/CD (optional) ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jenkins.DOMAIN_HERE;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_HERE/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Chỉ cho IP cua may truy cap Jenkins (bao mat)
    # Uncomment va sua IP nay neu can:
    # allow 1.2.3.4;  # IP nha may
    # deny all;

    location / {
        proxy_pass http://paintco_jenkins;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90;
        proxy_redirect http://127.0.0.1:8080 https://jenkins.DOMAIN_HERE;
    }
}
