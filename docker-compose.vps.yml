version: '3.9'

# Docker Compose cho VPS - Nginx chay tren host (khong phai container)
# Backend expose :3000, Frontend expose :4000

services:
  mysql:
    image: mysql:8.0
    container_name: paintco_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass2024}
      MYSQL_DATABASE: ${DB_DATABASE:-paintco_db}
      MYSQL_USER: ${DB_USERNAME:-paintco}
      MYSQL_PASSWORD: ${DB_PASSWORD:-paintco123}
    ports:
      - "127.0.0.1:3306:3306"   # Chi bind localhost, khong expose ra ngoai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - paintco_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paintco_backend
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3000:3000"   # Chi localhost, Nginx se proxy
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/products"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - paintco_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paintco_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:80"     # Frontend nginx trong container -> host port 4000
    depends_on:
      - backend
    networks:
      - paintco_net

volumes:
  mysql_data:
  uploads_data:

networks:
  paintco_net:
    driver: bridge
