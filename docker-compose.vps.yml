version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: paintco_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass2024}
      MYSQL_DATABASE: ${DB_DATABASE:-paintco_db}
      MYSQL_USER: ${DB_USERNAME:-paintco}
      MYSQL_PASSWORD: ${DB_PASSWORD:-paintco123}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - paintco_net

  backend:
    # 👉 dùng image (production)
    image: duykhanh/paintco-backend:latest

    # 👉 nếu muốn build tại VPS thì mở cái này
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile

    container_name: paintco_backend
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
    networks:
      - paintco_net

  frontend:
    # 👉 dùng image (production)
    image: duykhanh/paintco-frontend:latest

    # 👉 nếu muốn build tại VPS thì mở cái này
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile

    container_name: paintco_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:80"
    depends_on:
      - backend
    networks:
      - paintco_net

  nginx:
    image: nginx:1.25-alpine
    container_name: paintco_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - paintco_net

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  mysql_data:
  uploads_data:

networks:
  paintco_net:
    driver: bridge