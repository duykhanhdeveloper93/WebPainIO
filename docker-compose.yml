version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: paintco_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_2024
      MYSQL_DATABASE: paintco_db
      MYSQL_USER: paintco
      MYSQL_PASSWORD: paintco123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "paintco", "--password=paintco123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - paintco_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paintco_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: paintco
      DB_PASSWORD: paintco123
      DB_DATABASE: paintco_db
      JWT_SECRET: super-secret-key
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - paintco_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paintco_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - paintco_net

  nginx:
    image: nginx:1.25-alpine
    container_name: paintco_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - paintco_net

volumes:
  mysql_data:
  uploads_data:

networks:
  paintco_net: